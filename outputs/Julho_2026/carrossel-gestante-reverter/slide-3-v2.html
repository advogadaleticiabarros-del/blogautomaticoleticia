<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --dourado:       #C9A962;
      --dourado-claro: #E8D7A6;
      --dourado-escuro:#A8863F;
      --grad-dourado:  linear-gradient(135deg, #E8D7A6 0%, #C9A962 45%, #A8863F 100%);
      --fundo-escuro:  #231E1A;
      --fundo-alt:     #2E2720;
      --texto-claro:   #F5F1EB;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; background: var(--fundo-escuro); }

    .creative {
      width: 1080px;
      height: 1350px;
      background:
        radial-gradient(circle at 15% 85%, rgba(201,169,98,0.12), transparent 55%),
        linear-gradient(135deg, var(--fundo-escuro) 0%, var(--fundo-alt) 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 64px 48px;
      font-family: 'Inter', sans-serif;
      color: var(--texto-claro);
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      opacity: 0.35;
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(135deg, rgba(35,30,26,0.72) 0%, rgba(35,30,26,0.88) 100%);
    }

    .numero {
      position: absolute;
      top: -80px;
      right: -120px;
      font-family: 'Playfair Display', serif;
      font-size: 480px;
      font-weight: 900;
      color: rgba(201,169,98,0.08);
      z-index: 0;
      line-height: 1;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 2;
      margin-bottom: 48px;
    }
    .brand {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .brand__logo {
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.45));
    }
    .brand__text {
      display: flex;
      flex-direction: column;
    }
    .brand .name {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--texto-claro);
    }
    .brand .sub {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dourado);
    }
    .cat {
      background: rgba(201,169,98,0.15);
      color: var(--dourado);
      padding: 8px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid rgba(201,169,98,0.3);
    }

    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      position: relative;
      z-index: 2;
    }
    .kicker {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dourado);
      margin-bottom: 24px;
    }
    .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 96px;
      line-height: 0.95;
      color: var(--texto-claro);
      margin-bottom: 32px;
      max-width: 95%;
    }
    .headline em {
      display: block;
      background: var(--grad-dourado);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subheadline {
      font-size: 28px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(245,241,235,0.78);
      max-width: 90%;
      margin-bottom: 48px;
    }

    .bottom {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .cta-btn {
      background: var(--grad-dourado);
      color: var(--fundo-escuro);
      padding: 18px 36px;
      border-radius: 8px;
      font-size: 24px;
      font-weight: 700;
      border: none;
      box-shadow: 0 6px 24px rgba(201,169,98,0.4);
    }
    .handle {
      font-size: 16px;
      font-weight: 600;
      color: rgba(245,241,235,0.65);
    }
    .handle .oab {
      display: block;
      font-size: 12px;
      color: var(--dourado);
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="creative">
    <div class="numero">3</div>

    <img class="bg-image" src="" alt="">
    <div class="bg-overlay"></div>

    <div class="top">
      <div class="brand">
        <svg class="brand__logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" fill="#C9A962" rx="12"/>
          <text x="50" y="65" font-family="Playfair Display, serif" font-size="48" font-weight="700" fill="#231E1A" text-anchor="middle">LB</text>
        </svg>
        <div class="brand__text">
          <span class="name">Letícia Barros</span>
          <span class="sub">Advocacia</span>
        </div>
      </div>
      <span class="cat">Prova</span>
    </div>

    <div class="center">
      <span class="kicker">4 Provas Práticas</span>
      <h1 class="headline">COMO VOCÊ<em>PROVA</em></h1>
      <p class="subheadline">📱 Mensagens do chefe • 👥 Testemunhas • ⏱️ Contexto de pressão • ✗ Falta de sindicato</p>
    </div>

    <div class="bottom">
      <button class="cta-btn">💬 Documente</button>
      <span class="handle">
        @adv.leticiabarros2<br><span class="oab">OAB/ES 39.948</span>
      </span>
    </div>
  </div>
</body>
</html>
