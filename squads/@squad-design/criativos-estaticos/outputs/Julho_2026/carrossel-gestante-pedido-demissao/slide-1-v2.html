<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grávida pode pedir demissão? V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #1a3a5c;
            --color-accent: #c8a96e;
            --color-cta: #25D366;
            --color-dark: #1a1a2e;
            --color-light: #ffffff;
            --color-bg: #f8f6f0;
            --color-muted: #6b7280;
            --color-border: #e5e0d8;
        }

        body {
            width: 1080px;
            height: 1350px;
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, var(--color-bg) 0%, #f3ede0 100%);
            overflow: hidden;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(135deg, var(--color-primary) 0%, #2a4f7c 100%);
            z-index: 1;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .slide-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 100px 40px 60px;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .kicker {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 52px;
            font-weight: 700;
            color: var(--color-light);
            line-height: 1.25;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .accent-line {
            width: 60px;
            height: 3px;
            background: var(--color-accent);
            margin: 20px auto;
            border-radius: 2px;
        }

        .subheading {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 400;
            color: var(--color-muted);
            line-height: 1.75;
            margin-top: 30px;
            max-width: 600px;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--color-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            font-weight: 700;
            font-size: 20px;
        }

        .pager {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--color-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-content">
            <div class="kicker">Direitos da Gestante</div>
            <div class="headline">Grávida pode pedir demissão?</div>
            <div class="accent-line"></div>
            <div class="subheading">Conheça seus direitos e como se proteger legalmente</div>
        </div>
        <div class="footer">
            <div class="logo">LB</div>
            <div class="pager">1/5</div>
        </div>
    </div>
</body>
</html>
