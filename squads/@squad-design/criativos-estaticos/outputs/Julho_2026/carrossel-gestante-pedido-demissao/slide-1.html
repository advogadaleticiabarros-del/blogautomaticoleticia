<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grávida pode pedir demissão?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #1a3a5c;
            --color-accent: #c8a96e;
            --color-cta: #25D366;
            --color-dark: #1a1a2e;
            --color-light: #ffffff;
            --color-bg: #f8f6f0;
            --color-muted: #6b7280;
            --color-border: #e5e0d8;
        }

        body {
            width: 1080px;
            height: 1350px;
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-bg) 0%, #f0ede5 100%);
            overflow: hidden;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350"><defs><pattern id="pattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="50" cy="50" r="1" fill="%23c8a96e" opacity="0.1"/></pattern></defs><rect width="1080" height="1350" fill="url(%23pattern)"/></svg>');
            opacity: 0.5;
        }

        .slide-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 60px 40px;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .kicker {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1.3;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .subheading {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-weight: 400;
            color: var(--color-muted);
            line-height: 1.75;
            margin-bottom: 40px;
        }

        .image-placeholder {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-light);
            font-size: 60px;
            margin: 30px 0;
            border: 3px solid var(--color-accent);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--color-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            font-weight: 700;
            font-size: 20px;
        }

        .pager {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--color-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-content">
            <div class="kicker">Direitos da Gestante</div>
            <div class="headline">Grávida pode pedir demissão?</div>
            <div class="image-placeholder">👶</div>
            <div class="subheading">Conheça seus direitos e como se proteger legalmente</div>
        </div>
        <div class="footer">
            <div class="logo">LB</div>
            <div class="pager">1/5</div>
        </div>
    </div>
</body>
</html>
