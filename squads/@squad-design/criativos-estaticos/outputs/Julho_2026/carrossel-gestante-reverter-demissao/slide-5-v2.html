<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urgência: Prazo de 2 Anos V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #1a3a5c;
            --color-accent: #c8a96e;
            --color-cta: #25D366;
            --color-dark: #1a1a2e;
            --color-light: #ffffff;
            --color-bg: #f8f6f0;
            --color-muted: #6b7280;
            --color-border: #e5e0d8;
        }

        body {
            width: 1080px;
            height: 1350px;
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary) 0%, #2a4f7c 100%);
            overflow: hidden;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350"><defs><pattern id="pattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse"><circle cx="100" cy="100" r="50" fill="none" stroke="%23c8a96e" stroke-width="1" opacity="0.1"/></pattern></defs><rect width="1080" height="1350" fill="url(%23pattern)"/></svg>');
            opacity: 0.3;
        }

        .slide::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(200, 169, 110, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .slide-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 60px 40px;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .urgency-badge {
            display: inline-block;
            background: var(--color-cta);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.35);
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--color-light);
            line-height: 1.3;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .subheading {
            font-family: 'Inter', sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.75;
            margin-bottom: 40px;
            max-width: 700px;
        }

        .timer {
            background: rgba(200, 169, 110, 0.25);
            border: 2px solid var(--color-accent);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--color-accent);
            box-shadow: 0 8px 24px rgba(200, 169, 110, 0.2);
        }

        .cta-button {
            display: inline-block;
            background: var(--color-cta);
            color: white;
            padding: 16px 40px;
            border-radius: 50px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            margin: 20px 0;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.35);
            position: relative;
            z-index: 3;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(37, 211, 102, 0.45);
        }

        .contact-info {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 20px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            font-weight: 700;
            font-size: 20px;
            backdrop-filter: blur(10px);
        }

        .pager {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            letter-spacing: 1px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-content">
            <div class="urgency-badge">⏰ Urgência</div>
            <div class="headline">Tempo é ouro</div>
            <div class="timer">2 ANOS</div>
            <div class="subheading">Você tem apenas 2 anos contados da demissão para entrar com ação judicial. Não espere!</div>
            <button class="cta-button">Fale Comigo Agora</button>
            <div class="contact-info">Clique e inicie uma conversa via WhatsApp</div>
        </div>
        <div class="footer">
            <div class="logo">LB</div>
            <div class="pager">5/5</div>
        </div>
    </div>
</body>
</html>
