<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Como Provar a Coação V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #1a3a5c;
            --color-accent: #c8a96e;
            --color-cta: #25D366;
            --color-dark: #1a1a2e;
            --color-light: #ffffff;
            --color-bg: #f8f6f0;
            --color-muted: #6b7280;
            --color-border: #e5e0d8;
        }

        body {
            width: 1080px;
            height: 1350px;
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-bg) 0%, #f0ede5 100%);
            overflow: hidden;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
        }

        .slide-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 50px 40px;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .kicker {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1.3;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
        }

        .proof-box {
            width: 100%;
            max-width: 650px;
            text-align: left;
        }

        .proof-item {
            padding: 16px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.08), rgba(37, 211, 102, 0.04));
            border-left: 4px solid var(--color-cta);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--color-dark);
            font-weight: 500;
            line-height: 1.6;
            transition: transform 0.2s ease;
        }

        .proof-item:hover {
            transform: translateX(2px);
        }

        .proof-title {
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 4px;
        }

        .proof-desc {
            font-size: 14px;
            color: var(--color-muted);
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--color-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            font-weight: 700;
            font-size: 20px;
        }

        .pager {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--color-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-content">
            <div class="kicker">Prova</div>
            <div class="headline">Como Provar a Coação</div>
            <div class="proof-box">
                <div class="proof-item">
                    <div class="proof-title">Mensagens</div>
                    <div class="proof-desc">E-mails, SMS, WhatsApp com pressão da empresa</div>
                </div>
                <div class="proof-item">
                    <div class="proof-title">Testemunhas</div>
                    <div class="proof-desc">Colegas que presenciaram a conversa ou pressão</div>
                </div>
                <div class="proof-item">
                    <div class="proof-title">Contexto</div>
                    <div class="proof-desc">Demissões em massa, desempenho anterior positivo</div>
                </div>
                <div class="proof-item">
                    <div class="proof-title">Documentação</div>
                    <div class="proof-desc">Banco de horas, férias vencidas, bônus perdidos</div>
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="logo">LB</div>
            <div class="pager">3/5</div>
        </div>
    </div>
</body>
</html>
