<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vícios de Consentimento — Você foi Coagida? V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #1a3a5c;
            --color-accent: #c8a96e;
            --color-cta: #25D366;
            --color-dark: #1a1a2e;
            --color-light: #ffffff;
            --color-bg: #f8f6f0;
            --color-muted: #6b7280;
            --color-border: #e5e0d8;
        }

        body {
            width: 1080px;
            height: 1350px;
            font-family: 'Inter', sans-serif;
            background: var(--color-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .slide {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-bg) 0%, #f0ede5 100%);
            overflow: hidden;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(200, 169, 110, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .slide::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -30%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(26, 58, 92, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .slide-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 50px 40px;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .kicker {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: var(--color-accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 44px;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1.3;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
        }

        .vices-list {
            width: 100%;
            max-width: 650px;
            text-align: left;
        }

        .vice-item {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8), rgba(248, 246, 240, 0.8));
            border-left: 4px solid var(--color-accent);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--color-dark);
            font-weight: 500;
            line-height: 1.5;
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease;
        }

        .vice-item:hover {
            transform: translateX(4px);
        }

        .vice-icon {
            font-size: 18px;
            margin-right: 15px;
            color: var(--color-primary);
            font-weight: 700;
            flex-shrink: 0;
        }

        .vice-title {
            font-weight: 700;
            color: var(--color-primary);
        }

        .vice-desc {
            font-size: 14px;
            color: var(--color-muted);
            margin-top: 3px;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--color-primary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-accent);
            font-weight: 700;
            font-size: 20px;
        }

        .pager {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: var(--color-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap');
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-content">
            <div class="kicker">Fundamentos Legais</div>
            <div class="headline">Vícios de Consentimento</div>
            <div class="vices-list">
                <div class="vice-item">
                    <span class="vice-icon">1</span>
                    <span>
                        <div class="vice-title">Coação</div>
                        <div class="vice-desc">Pressão da empresa para você pedir demissão</div>
                    </span>
                </div>
                <div class="vice-item">
                    <span class="vice-icon">2</span>
                    <span>
                        <div class="vice-title">Desconhecimento</div>
                        <div class="vice-desc">Você não sabia de seus direitos de gestante</div>
                    </span>
                </div>
                <div class="vice-item">
                    <span class="vice-icon">3</span>
                    <span>
                        <div class="vice-title">Falta de Homologação</div>
                        <div class="vice-desc">Seu pedido não foi formalizado legalmente</div>
                    </span>
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="logo">LB</div>
            <div class="pager">2/5</div>
        </div>
    </div>
</body>
</html>
