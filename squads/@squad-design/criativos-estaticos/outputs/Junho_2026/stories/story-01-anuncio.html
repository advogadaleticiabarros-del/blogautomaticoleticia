<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<!-- TEMPLATE STORY 9:16 — 1080x1920 — Letícia Barros -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Playfair+Display:wght@600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --dourado:#C9A962; --dourado-claro:#E8D7A6; --dourado-escuro:#A8863F;
    --grad:linear-gradient(135deg,#E8D7A6,#C9A962 45%,#A8863F);
    --escuro:#231E1A; --alt:#2E2720; --claro:#F5F1EB; --wpp:#25D366;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{margin:0}
  .story{
    width:1080px;height:1920px;position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    padding:120px 90px 130px;
    font-family:'Inter',sans-serif;color:var(--claro);
    background:
      radial-gradient(circle at 80% 10%, rgba(201,169,98,.18), transparent 40%),
      linear-gradient(165deg,var(--escuro) 0%, var(--alt) 100%);
  }
  .bg-image{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.30}
  .bg-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(35,30,26,.6),rgba(35,30,26,.82) 55%,rgba(35,30,26,.96))}
  .story::before{content:'';position:absolute;inset:40px;border:1.5px solid rgba(201,169,98,.5);border-radius:26px;z-index:3;pointer-events:none}

  /* Topo: logo */
  .top{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center}
  .logo{width:150px;height:150px;object-fit:contain;filter:drop-shadow(0 3px 12px rgba(0,0,0,.5));margin-bottom:18px}
  .brand-name{font-family:'Playfair Display',serif;font-size:46px;font-weight:700}
  .brand-sub{font-size:19px;letter-spacing:5px;text-transform:uppercase;color:var(--dourado);margin-top:6px}

  /* Centro */
  .center{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center}
  .kicker{font-size:30px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--dourado-claro);margin-bottom:34px}
  h1{font-family:'Playfair Display',serif;font-weight:900;font-size:108px;line-height:1.04;margin-bottom:40px}
  h1 em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .lead{font-size:42px;line-height:1.5;color:rgba(245,241,235,.85);max-width:90%;margin:0 auto}

  /* Rodapé: chamada */
  .bottom{position:relative;z-index:2;text-align:center}
  .pill{display:inline-block;background:var(--grad);color:var(--escuro);font-size:38px;font-weight:700;padding:26px 56px;border-radius:999px;box-shadow:0 8px 30px rgba(201,169,98,.4);margin-bottom:26px}
  .handle{font-size:30px;color:rgba(245,241,235,.7);font-weight:600}
  .handle .oab{display:block;font-size:24px;color:var(--dourado);margin-top:6px}
</style>
</head>
<body>
  <div class="story">
    <img class="bg-image" src="https://images.unsplash.com/photo-1450101499163-c8848c66ca85?w=1080&q=80" alt="">
    <div class="bg-overlay"></div>

    <div class="top">
      <img class="logo" src="file:///C:/Users/prosy/blogautomaticoleticia/squads/@squad-design/criativos-estaticos/assets/logo-lb.png" alt="Letícia Barros">
      <div class="brand-name">Letícia Barros</div>
      <div class="brand-sub">Advocacia &amp; Consultoria</div>
    </div>

    <div class="center">
      <span class="kicker">Essa semana no perfil</span>
      <h1>Rescisão <em>indireta</em></h1>
      <p class="lead">Tudo o que você precisa saber, sem juridiquês. Seus direitos e também os riscos, com sinceridade.</p>
    </div>

    <div class="bottom">
      <div class="pill">2 conteúdos por dia</div>
      <div class="handle">@adv.leticiabarros2<span class="oab">OAB/ES 39.948</span></div>
    </div>
  </div>
</body>
</html>
